# Ruff configuration for TIGRESS.
target-version = "py38"
line-length = 100

[lint]
# Pyflakes (F) + a pragmatic pycodestyle subset (E) + import sorting (I).
select = ["E4", "E7", "E9", "F", "I"]

[lint.per-file-ignores]
# Tests may reach into private attributes to assert internal state.
"tests/*" = ["E402"]
